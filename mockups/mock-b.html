<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mockup B — Battle HUD</title>
<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#FFD700; --gold-dim:#B8860B; --bronze:#8B6914;
  --parchment:#f2e0b5; --parchment-dim:#c4a878;
  --ink:#0e0600;
  --glass:rgba(14,8,4,.70);
  --glass-border:rgba(220,180,90,.50);
  --hyrule-tint:rgba(45,110,60,.22);
  --ganon-tint:rgba(140,20,30,.22);
  --glow:0 0 22px rgba(255,215,0,.55);
  --font:'MedievalSharp',serif;
  --font-ui:'Cinzel',serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font);color:var(--parchment);-webkit-font-smoothing:antialiased}
body{background:#000 url('../screenshots/ux-audit/desktop-board-clean.png') center/cover no-repeat;position:relative}
body.mobile{background-image:url('../screenshots/ux-audit/mobile-board-clean.png')}
.vignette{position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 45%,rgba(0,0,0,.55) 100%);pointer-events:none;z-index:1}

/* ============ LOBBY ============ */
.lobby{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;z-index:10;background:radial-gradient(ellipse at center,rgba(0,0,0,.35) 0%,rgba(0,0,0,.82) 85%)}
body.show-lobby .lobby{display:flex}
body.show-lobby .hud{display:none!important}

.lobby .hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;width:100%;padding:8vh 20px 0}
.triforce{width:140px;height:128px;position:relative;filter:drop-shadow(0 0 32px rgba(255,215,0,.6))}
.triforce::before,.triforce::after,.triforce>div{position:absolute;width:0;height:0;border-left:35px solid transparent;border-right:35px solid transparent;border-bottom:60px solid var(--gold);filter:drop-shadow(0 0 10px rgba(255,215,0,.75))}
.triforce::before{left:35px;top:0;content:""}
.triforce::after{left:0;top:60px;content:""}
.triforce>div{left:70px;top:60px}
.title{font-family:var(--font);font-size:96px;color:var(--gold);letter-spacing:8px;text-shadow:0 0 32px rgba(255,215,0,.75),0 5px 0 #5a3a00,0 8px 22px rgba(0,0,0,.9);line-height:1}
.subtitle{font-family:var(--font-ui);font-size:18px;letter-spacing:10px;color:var(--parchment-dim);text-transform:uppercase}

.mode-tickets{display:flex;gap:0;padding-bottom:6vh;width:100%;justify-content:center}
.ticket{position:relative;width:240px;height:120px;margin:0 -8px;background:linear-gradient(180deg,rgba(30,18,6,.95),rgba(8,4,0,.95));border:2px solid var(--glass-border);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;clip-path:polygon(10px 0,calc(100% - 10px) 0,100% 18px,100% calc(100% - 18px),calc(100% - 10px) 100%,10px 100%,0 calc(100% - 18px),0 18px);transition:transform .15s}
.ticket:hover{transform:translateY(-4px)}
.ticket.primary{border-color:var(--gold);box-shadow:var(--glow);transform:scale(1.06);z-index:2}
.ticket-icon{font-size:34px;color:var(--gold);filter:drop-shadow(0 0 8px rgba(255,215,0,.6))}
.ticket-name{font-family:var(--font);font-size:22px;color:var(--parchment);letter-spacing:1px;margin-top:4px}
.ticket-sub{font-family:var(--font-ui);font-size:10px;letter-spacing:2.5px;color:var(--parchment-dim);text-transform:uppercase;margin-top:2px}

body.mobile .title{font-size:56px;letter-spacing:4px}
body.mobile .subtitle{font-size:12px;letter-spacing:5px}
body.mobile .triforce{width:96px;height:88px}
body.mobile .triforce::before,body.mobile .triforce::after,body.mobile .triforce>div{border-left-width:24px;border-right-width:24px;border-bottom-width:42px}
body.mobile .triforce::before{left:24px}
body.mobile .triforce::after{top:42px}
body.mobile .triforce>div{left:48px;top:42px}
body.mobile .mode-tickets{flex-direction:column;gap:12px;padding:0 16px 4vh}
body.mobile .ticket{margin:0;width:100%;height:64px;flex-direction:row;gap:14px;padding:0 22px;justify-content:flex-start;clip-path:polygon(8px 0,calc(100% - 8px) 0,100% 14px,100% calc(100% - 14px),calc(100% - 8px) 100%,8px 100%,0 calc(100% - 14px),0 14px)}
body.mobile .ticket.primary{transform:scale(1)}
body.mobile .ticket-icon{font-size:26px}
body.mobile .ticket-name{font-size:18px;margin-top:0}
body.mobile .ticket-sub{margin-top:1px;font-size:9px}

/* ============ IN-GAME TOP BAR ============ */
.hud{position:fixed;inset:0;pointer-events:none;z-index:5}
.hud>*{pointer-events:auto}

.top-bar{position:fixed;top:0;left:0;right:0;height:72px;display:flex;align-items:stretch;background:linear-gradient(180deg,var(--glass) 0%,rgba(14,8,4,.35) 100%);backdrop-filter:blur(12px) saturate(1.2);-webkit-backdrop-filter:blur(12px);border-bottom:1.5px solid var(--glass-border);box-shadow:0 6px 22px rgba(0,0,0,.55);z-index:6}

.player-slab{flex:1;display:flex;align-items:center;gap:14px;padding:0 20px;position:relative;overflow:hidden;min-width:0}
.player-slab.left{justify-content:flex-start;background:linear-gradient(90deg,var(--hyrule-tint),transparent 60%)}
.player-slab.right{justify-content:flex-end;flex-direction:row-reverse;background:linear-gradient(-90deg,var(--ganon-tint),transparent 60%)}
.player-slab.active::after{content:"";position:absolute;inset:0;border-top:2px solid var(--gold);box-shadow:inset 0 10px 24px -6px rgba(255,215,0,.3);pointer-events:none;animation:pulseTop 2.4s ease-in-out infinite}
@keyframes pulseTop{0%,100%{box-shadow:inset 0 10px 24px -6px rgba(255,215,0,.3)}50%{box-shadow:inset 0 14px 32px -6px rgba(255,215,0,.55)}}

.avatar{width:52px;height:52px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#FFD700,#8B6914 70%,#3a2000);display:flex;align-items:center;justify-content:center;font-family:var(--font);font-size:26px;color:#1a0e00;border:2px solid var(--gold);flex-shrink:0;text-shadow:0 1px 0 rgba(255,255,255,.3)}
.player-slab.right .avatar{background:radial-gradient(circle at 35% 30%,#c44040,#5a0000 70%,#200);color:#f2e0b5}
.player-info{display:flex;flex-direction:column;line-height:1.1;min-width:0}
.player-slab.right .player-info{text-align:right}
.player-name{font-family:var(--font);font-size:20px;color:var(--gold);white-space:nowrap;letter-spacing:1px}
.captured-row{display:flex;gap:3px;margin-top:4px;align-items:center;flex-wrap:wrap;max-width:340px}
.cap-pill{display:inline-flex;align-items:center;gap:2px;padding:1px 7px;border-radius:10px;background:rgba(0,0,0,.35);border:1px solid rgba(220,180,90,.2);font-family:var(--font-ui);font-size:12px;color:var(--parchment)}
.cap-pill .s{font-size:15px;color:#fff;line-height:1}
.cap-pill .x{color:var(--gold-dim);font-size:10px;letter-spacing:.5px}

.vs-chip{width:86px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-left:1px solid var(--glass-border);border-right:1px solid var(--glass-border);background:rgba(0,0,0,.4);position:relative}
.vs-chip .tri{width:32px;height:30px;position:relative;margin-bottom:2px}
.vs-chip .tri::before,.vs-chip .tri::after,.vs-chip .tri>div{position:absolute;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:14px solid var(--gold);filter:drop-shadow(0 0 4px rgba(255,215,0,.7))}
.vs-chip .tri::before{left:8px;top:0;content:""}
.vs-chip .tri::after{left:0;top:14px;content:""}
.vs-chip .tri>div{left:16px;top:14px}
.vs-chip .label{font-family:var(--font-ui);font-size:9px;letter-spacing:2.5px;color:var(--gold);text-transform:uppercase}
.vs-chip .move-num{font-family:var(--font);font-size:15px;color:var(--parchment);margin-top:1px}

/* ============ BOTTOM BAR ============ */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;height:56px;display:flex;align-items:center;padding:0 16px;background:linear-gradient(0deg,var(--glass) 0%,rgba(14,8,4,.25) 100%);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1.5px solid var(--glass-border);z-index:6;gap:12px}
.btn-icon{width:42px;height:42px;border-radius:10px;background:rgba(0,0,0,.42);border:1px solid var(--glass-border);color:var(--parchment);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;flex-shrink:0}
.btn-icon:hover{background:rgba(139,105,20,.4);color:var(--gold)}
.btn-icon.danger:hover{background:rgba(140,20,30,.45);color:#ff9090;border-color:#c44040}

.last-move-ticker{flex:1;height:42px;display:flex;align-items:center;padding:0 18px;background:rgba(0,0,0,.42);border:1px solid var(--glass-border);border-radius:10px;font-family:var(--font-ui);font-size:13px;color:var(--parchment);gap:10px;overflow:hidden;min-width:0}
.last-move-ticker .tag{font-family:var(--font);color:var(--gold-dim);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;flex-shrink:0}
.last-move-ticker .txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.last-move-ticker .piece{color:var(--gold);font-size:15px}

/* Mobile */
body.mobile .top-bar{height:62px}
body.mobile .player-slab{padding:0 10px;gap:9px}
body.mobile .avatar{width:42px;height:42px;font-size:20px;border-width:1.5px}
body.mobile .player-name{font-size:16px}
body.mobile .captured-row{margin-top:3px;gap:2px;max-width:160px}
body.mobile .cap-pill{padding:1px 5px;font-size:10px}
body.mobile .cap-pill .s{font-size:12px}
body.mobile .vs-chip{width:64px}
body.mobile .vs-chip .tri{width:24px;height:22px}
body.mobile .vs-chip .tri::before,body.mobile .vs-chip .tri::after,body.mobile .vs-chip .tri>div{border-left-width:6px;border-right-width:6px;border-bottom-width:11px}
body.mobile .vs-chip .tri::before{left:6px}
body.mobile .vs-chip .tri::after{top:11px}
body.mobile .vs-chip .tri>div{left:12px;top:11px}
body.mobile .vs-chip .label{font-size:8px;letter-spacing:1.5px}
body.mobile .bottom-bar{height:52px;padding:0 10px;gap:8px;padding-bottom:env(safe-area-inset-bottom,0)}
body.mobile .btn-icon{width:38px;height:38px;font-size:16px}
body.mobile .last-move-ticker{height:38px;padding:0 12px;font-size:11px}
body.mobile .last-move-ticker .tag{font-size:10px}

/* Concept label */
.concept-badge{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--font);color:rgba(255,215,0,.10);font-size:180px;letter-spacing:30px;pointer-events:none;z-index:0;user-select:none}
body.mobile .concept-badge{font-size:100px;letter-spacing:18px}
</style>
</head>
<body>
<div class="vignette"></div>
<div class="concept-badge">B</div>

<!-- LOBBY -->
<div class="lobby">
  <div class="hero">
    <div class="triforce"><div></div></div>
    <h1 class="title">HYRULE CHESS</h1>
    <div class="subtitle">The Battle for the Triforce</div>
  </div>
  <div class="mode-tickets">
    <div class="ticket"><div class="ticket-icon">🜲</div><div class="ticket-name">Face Ganon</div><div class="ticket-sub">Vs CPU</div></div>
    <div class="ticket primary"><div class="ticket-icon">⚔</div><div class="ticket-name">Quick Duel</div><div class="ticket-sub">Local hot-seat</div></div>
    <div class="ticket"><div class="ticket-icon">✦</div><div class="ticket-name">Play Online</div><div class="ticket-sub">Challenge a friend</div></div>
  </div>
</div>

<!-- IN-GAME HUD -->
<div class="hud">
  <div class="top-bar">
    <div class="player-slab left active">
      <div class="avatar">⚔</div>
      <div class="player-info">
        <div class="player-name">Hyrule</div>
        <div class="captured-row">
          <span class="cap-pill"><span class="s">♟</span><span class="x">×3</span></span>
          <span class="cap-pill"><span class="s">♝</span><span class="x">×1</span></span>
          <span class="cap-pill"><span class="s">♞</span><span class="x">×1</span></span>
        </div>
      </div>
    </div>
    <div class="vs-chip">
      <div class="tri"><div></div></div>
      <div class="label">Move</div>
      <div class="move-num">12</div>
    </div>
    <div class="player-slab right">
      <div class="avatar">☠</div>
      <div class="player-info">
        <div class="player-name">Ganon</div>
        <div class="captured-row">
          <span class="cap-pill"><span class="s">♟</span><span class="x">×2</span></span>
          <span class="cap-pill"><span class="s">♜</span><span class="x">×1</span></span>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="btn-icon" title="Menu">☰</button>
    <button class="btn-icon" title="Chronicle">📜</button>
    <div class="last-move-ticker">
      <span class="tag">Last</span>
      <span class="txt">Hyrule <span class="piece">♝</span> c4 → f7+ <span style="color:#ff9090">capturing ♟</span> — Check</span>
    </div>
    <button class="btn-icon danger" title="Resign">⚑</button>
    <button class="btn-icon" title="New Game">↻</button>
  </div>
</div>

<script>
const p = new URLSearchParams(location.search);
if (p.get('screen') === 'lobby') document.body.classList.add('show-lobby');
if (p.get('view') === 'mobile') document.body.classList.add('mobile');
</script>
</body>
</html>
